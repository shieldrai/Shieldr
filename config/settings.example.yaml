# Shieldr — Configuration Template
# Copy this file to settings.yaml and fill in your values.
# NEVER commit settings.yaml — it contains secrets.

# ---------------------------------------------------------------------------
# RPC Endpoints
# ---------------------------------------------------------------------------
rpc:
  ethereum: "https://mainnet.infura.io/v3/YOUR_INFURA_KEY"
  bsc:      "https://bsc-dataseed.binance.org/"
  polygon:  "https://polygon-rpc.com/"
  arbitrum: "https://arb1.arbitrum.io/rpc"
  optimism: "https://mainnet.optimism.io"
  base:     "https://mainnet.base.org"
  avalanche: "https://api.avax.network/ext/bc/C/rpc"   # beta
  fantom:   "https://rpcapi.fantom.network"             # beta
  zksync:   "https://mainnet.era.zksync.io"             # beta

# Default chain for commands that do not specify --chain
default_chain_id: 1

# ---------------------------------------------------------------------------
# Threat-Intelligence API Keys (all optional — free fallbacks exist)
# ---------------------------------------------------------------------------
threat_intel:
  # TRM Labs — sanctions screening and wallet risk
  trm_labs_key: ""

  # Chainalysis — risk scoring and entity attribution
  chainalysis_key: ""

  # GoPlus Security Labs — token safety and contract checks (free tier)
  gopluslabs_key: ""

  # De.Fi Shield — contract auditing data
  defi_shield_key: ""

  # URLhaus / PhishTank — phishing URL feeds (no key needed for public feed)
  phishtank_key: ""

# ---------------------------------------------------------------------------
# Transaction Simulation (Tenderly)
# ---------------------------------------------------------------------------
simulation:
  # Tenderly simulation API — leave empty to use basic local simulation
  tenderly_key:     ""
  tenderly_account: ""
  tenderly_project: ""

  # Maximum gas to simulate (prevents abuse)
  max_gas_limit: 3000000

# ---------------------------------------------------------------------------
# Alert System
# ---------------------------------------------------------------------------
alerts:
  enabled: true

  # Minimum seconds between repeat alerts for the same address
  cooldown_seconds: 300

  # Webhook URL for proactive alert delivery (optional)
  # Shieldr will POST a JSON payload to this URL when a threat is detected
  webhook_url: ""

  # Risk score threshold above which a proactive alert is sent
  alert_threshold: 60

# ---------------------------------------------------------------------------
# Caching
# ---------------------------------------------------------------------------
cache:
  # Time-to-live for cached risk results (seconds)
  ttl_wallet:   300   # 5 minutes
  ttl_token:    600   # 10 minutes
  ttl_contract: 3600  # 1 hour
  ttl_url:      180   # 3 minutes

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  # DEBUG | INFO | WARNING | ERROR
  level: "INFO"
  # Optional: path to log file (leave empty for stdout only)
  file: ""
